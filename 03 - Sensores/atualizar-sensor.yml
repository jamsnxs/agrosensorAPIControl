info:
  name: Atualizar Sensor
  type: http
  seq: 4

http:
  method: PUT
  url: http://localhost:3000/api/sensores/{{id}}
  body:
    type: json
    data: |-
      {
        "status": "Inativo"
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        // Captura o status HTTP da resposta
        const status = res.getStatus();

        // Atualização bem sucedida (200)
        if (status === 200) {
          test("Deve alterar as propriedades cadastrais do sensor", function() {
            expect(status).to.equal(200);
            const dados = res.getBody().dados || res.getBody();
            expect(dados.status).to.equal("Inativo");
          });
        // ID inexistente (400)
        } else if (status === 400) {
          test("Deve falhar com 400 se o sensor não existir no banco", function() {
            expect(status).to.equal(400);
          });
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: "Atualiza dados do sensor pelo ID"
