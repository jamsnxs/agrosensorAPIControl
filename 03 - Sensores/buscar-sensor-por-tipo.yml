info:
  name: Buscar Sensor por Tipo
  type: http
  seq: 6

http:
  method: GET
  url: http://localhost:3000/api/sensores/tipo/temperatura
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        // Captura o status e o corpo da resposta
        const status = res.getStatus();
        const sensores = res.getBody();

        // Filtro bem sucedido (200), verifica o tipo do primeiro sensor
        if (status === 200) {
          test("Deve filtrar sensores pelo tipo informado", function() {
            expect(sensores).to.be.an('array');
            if (sensores.length > 0) {
              expect(sensores[0].tipo).to.equal('temperatura');
            }
          });
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: "Busca sensores filtrando pelo tipo (temperatura, umidade_solo, etc)"
