info:
  name: Deletar Sensor
  type: http
  seq: 5

http:
  method: DELETE
  url: http://localhost:3000/api/sensores/{{id}}
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        // Captura o status HTTP da resposta
        const status = res.getStatus();

        // Deleção bem sucedida: 200 (com corpo) ou 204 (sem corpo)
        if (status === 200 || status === 204) {
          test("Deve excluir o sensor físico do catálogo com sucesso", function() {
            expect(status).to.be.oneOf([200, 204]);
          });
        // ID inexistente (400)
        } else if (status === 400) {
          test("Deve retornar 400 indicando que o recurso já foi removido", function() {
            expect(status).to.equal(400);
          });
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: "Remove sensor do catálogo pelo ID"
