info:
  name: criar
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:3000/api/sensores
  body:
    type: json
    data: |-
      {
        "nome": "DHT22 - Sensor de Temperatura",
        "tipo": "temperatura",
        "unidade": "°C",
        "status": "Ativo"
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        // Captura o status HTTP da resposta
        const status = res.getStatus();
        // Criação bem sucedida (201) ou atualização (200)
        if (status === 201 || status === 200) {
          test("Deve registrar o sensor no catálogo técnico", function() {
            expect(res.getBody().dados.tipo).to.equal("temperatura");
          });
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
