info:
  name: Buscar Sensor por ID
  type: http
  seq: 2

http:
  method: GET
  url: http://localhost:3000/api/sensores/{{id}}
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        // Captura o status e o corpo da resposta
        const status = res.getStatus();
        const sensor = res.getBody();

        // Sensor encontrado (200), verifica as propriedades técnicas
        if (status === 200) {
          test("Deve encontrar as especificações do sensor pelo ID", function() {
            expect(status).to.equal(200);
            expect(sensor).to.have.property('tipo');
            expect(sensor).to.have.property('unidade');
            expect(sensor).to.have.property('direcao');
          });
        // ID inexistente (400)
        } else if (status === 400) {
          test("Deve retornar 400 caso o sensor não exista", function() {
            expect(status).to.equal(400);
          });
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: "Busca sensor pelo ID"
