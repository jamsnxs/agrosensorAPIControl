info:
  name: buscarPorID
  type: http
  seq: 2

http:
  method: GET
  url: http://localhost:3000/api/usuarios/{{id}}
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        // Captura o status e o corpo da resposta
        const status = res.getStatus();
        const usuario = res.getBody();

        // Se encontrou o usuário (200), verifica os campos esperados
        if (status === 200) {
          test("Deve encontrar o usuário cadastrado pelo ID", function() {
            expect(status).to.equal(200);
            expect(usuario).to.be.an('object');
            expect(usuario).to.have.property('id');
            expect(usuario).to.have.property('nome');
            expect(usuario).to.have.property('email');
          });
        // Se o ID não existe (400), confere se veio uma mensagem de erro
        } else if (status === 400) {
          test("Deve retornar 400 caso o ID não exista no banco", function() {
            expect(status).to.equal(400);
            if (usuario.erro) {
              expect(usuario.erro).to.be.a('string');
            }
          });
        } else {
          test("Resposta inesperada do servidor", function() {
            expect(status).to.be.oneOf([200, 400]);
          });
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
