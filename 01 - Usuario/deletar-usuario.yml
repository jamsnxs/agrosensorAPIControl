info:
  name: Deletar Usuário
  type: http
  seq: 5

http:
  method: DELETE
  url: http://localhost:3000/api/usuarios/{{id}}
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        // Captura o status HTTP e o corpo da resposta
        const status = res.getStatus();
        const resposta = res.getBody();

        // Deleção bem sucedida: 200 (com corpo) ou 204 (sem corpo)
        if (status === 200 || status === 204) {
          test("Deve deletar o usuário com sucesso na primeira execução", function() {
            // Aceita tanto 200 (OK com objeto retornado) quanto 204 (No Content)
            expect(status).to.be.oneOf([200, 204]); 
          });

          // Se retornou 200 com corpo, verifica a mensagem de confirmação
          if (status === 200 && resposta) {
            test("Deve retornar mensagem de confirmação da remoção", function() {
              expect(resposta.mensagem).to.be.a('string');
            });
          }

        // Token não enviado ou inválido (401)
        } else if (status === 401) {
          test("Deve exigir autenticação para deletar", function() {
            expect(resposta.erro).to.be.a('string');
          });
        // Token de outro usuário (403)
        } else if (status === 403) {
          test("Deve barrar deleção de outro usuário", function() {
            expect(resposta.erro).to.be.a('string');
          });
        // ID inexistente (400)
        } else if (status === 400) {
          test("Nas execuções seguintes, deve retornar 400 (Usuário já não existe)", function() {
            expect(status).to.equal(400);
          });
        } else {
          test("Resposta inesperada do servidor no método DELETE", function() {
            expect(status).to.be.oneOf([200, 204, 400, 401, 403]);
          });
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: "Remove usuário pelo ID, autenticação obrigatória"
