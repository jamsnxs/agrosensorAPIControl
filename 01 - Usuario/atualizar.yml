info:
  name: atualizar
  type: http
  seq: 4

http:
  method: PUT
  url: http://localhost:3000/api/usuarios/70
  body:
    type: json
    data: |-
      {
        "nome": "Francisco",
        "senha": "senha123francisco"
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        const status = res.getStatus();
        const usuarioAlterado = res.getBody();

        if (status === 200) {
          test("Deve atualizar o usuário com sucesso (Status 200)", function() {
            expect(status).to.equal(200);
          });

          test("Deve persistir as modificações enviadas no payload", function() {
            const dados = usuarioAlterado.dados || usuarioAlterado;
            expect(dados.id).to.equal(1);
            expect(dados.nome).to.equal("Bizinho");
          });

          test("Deve manter os dados que não foram enviados no body", function() {
            const dados = usuarioAlterado.dados || usuarioAlterado;
            expect(dados).to.have.property('email');
            expect(dados.email).to.be.a('string');
          });

        } else if (status === 400) {
          test("Deve retornar 400 se tentar atualizar um ID inexistente", function() {
            expect(status).to.equal(400);
          });
        } else {
          test("Resposta inesperada do servidor no método PUT", function() {
            expect(status).to.be.oneOf([200, 400]);
          });
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
