info:
  name: Atualizar Dispositivo
  type: http
  seq: 4

http:
  method: PUT
  url: http://localhost:3000/api/dispositivos/{{id}}
  body:
    type: json
    data: |-
      {
        "status": "Inativo"
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        // Captura o status HTTP da resposta
        const status = res.getStatus();

        // Atualização bem sucedida (200)
        if (status === 200) {
          test("Deve atualizar o status do hardware com sucesso", function() {
            expect(status).to.equal(200);
            // Valida se o retorno segue a estrutura de dados padrão do MVC
            const dados = res.getBody().dados || res.getBody();
            expect(dados.status).to.equal("Inativo");
          });
        // ID inexistente (400)
        } else if (status === 400) {
          test("Deve retornar 400 ao tentar atualizar ID inexistente", function() {
            expect(status).to.equal(400);
          });
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: "Atualiza dados do dispositivo pelo ID"
