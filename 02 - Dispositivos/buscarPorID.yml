info:
  name: buscarPorID
  type: http
  seq: 2

http:
  method: GET
  url: http://localhost:3000/api/dispositivos/{{id}}
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        // Captura o status e o corpo da resposta
        const status = res.getStatus();
        const dispositivo = res.getBody();

        // Dispositivo encontrado (200), verifica os campos esperados
        if (status === 200) {
          test("Deve encontrar o dispositivo correto pelo ID", function() {
            expect(status).to.equal(200);
            expect(dispositivo).to.be.an('object');
            expect(dispositivo).to.have.property('nome');
          });
        // ID inexistente (400)
        } else if (status === 400) {
          test("Deve tratar ID inexistente com status 400", function() {
            expect(status).to.equal(400);
          });
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
