info:
  name: atualizar
  type: http
  seq: 4

http:
  method: PUT
  url: http://localhost:3000/api/dispositivos/1
  body:
    type: json
    data: |-
      {
        "status": "MANUTENCAO"
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        const status = res.getStatus();

        if (status === 200) {
          test("Deve atualizar o status do hardware com sucesso", function() {
            expect(status).to.equal(200);
            // Valida se o retorno segue a estrutura de dados padrão do seu MVC
            const dados = res.getBody().dados || res.getBody();
            expect(dados.status).to.equal("MANUTENCAO");
          });
        } else if (status === 404) {
          test("Deve retornar 404 ao tentar atualizar ID inexistente", function() {
            expect(status).to.equal(404);
          });
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
