info:
  name: Criar Dispositivo
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:3000/api/dispositivos
  body:
    type: json
    data: |-
      {
        "nome": "Arduino Mega 2560",
        "tipo": "Arduino_Mega",
        "status": "Ativo"
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        // Captura o status HTTP e o corpo da resposta
        const status = res.getStatus();
        const corpo = res.getBody();

        // Confirma que o POST retornou 201 e o nome do dispositivo está correto
        test("Deve criar o dispositivo de borda com sucesso", function() {
          expect(status).to.equal(201);
            expect(corpo.dados.nome).to.equal("Arduino Mega 2560");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: "Cadastra um novo dispositivo no sistema"
