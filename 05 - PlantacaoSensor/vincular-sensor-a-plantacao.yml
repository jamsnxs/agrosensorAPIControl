info:
  name: Vincular Sensor à Plantação
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:3000/api/plantacoes-sensores
  body:
    type: json
    data: |-
      {
        "plantacao_id": "{{plantacao_id}}",
        "sensor_id": "{{sensor_id}}",
        "limite_atencao": 25.0,
        "limite_critico": 10.0
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        // Captura o status HTTP da resposta
        const status = res.getStatus();
        // Aceita criação (200/201) ou bloqueio por vínculo duplicado (400)
        test("Deve criar o vínculo de monitoramento e os gatilhos de limites hídricos", function() {
          expect(status).to.be.oneOf([200, 201, 400]);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: "Vincula um sensor a uma plantação com limites de atenção e crítico"
