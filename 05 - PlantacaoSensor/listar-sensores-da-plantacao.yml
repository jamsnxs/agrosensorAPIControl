info:
  name: Listar Sensores da Plantação
  type: http
  seq: 4

http:
  method: GET
  url: http://localhost:3000/api/plantacoes-sensores/plantacao/{{plantacao_id}}
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        // Captura o status e o corpo da resposta
        const status = res.getStatus();
                const sensores = res.getBody();

                // Plantação encontrada (200), verifica a lista de vínculos
                if (status === 200) {
                  test("Deve retornar lista de sensores vinculados à plantação", function() {
                    expect(sensores).to.be.an('array');
                  });

                  // Confere a estrutura de cada item: sensor, limites, vínculos
                  test("Cada item deve conter dados do sensor e limites", function() {
                    if (sensores.length > 0) {
                      const item = sensores[0];
                      expect(item).to.have.property('sensor_id');
                      expect(item).to.have.property('limite_atencao');
                      expect(item).to.have.property('limite_critico');
                      expect(item).to.have.property('sensor');
                      expect(item.sensor).to.have.property('nome');
                      expect(item.sensor).to.have.property('tipo');
                    }
                  });

                  // Valida os dados do seed: plantacao1 tem sensor LDR com limite_atencao=25
                  test("Deve listar os sensores corretos baseado no seed", function() {
                    const sensorLuz = sensores.find(s => s.limite_atencao === 25);
                    expect(sensorLuz).to.exist;
                    expect(sensorLuz.sensor_id).to.be.a('string');
                    expect(sensorLuz.sensor.tipo).to.equal('luminosidade');
                  });
                } else {
                  test("Status code inesperado", function() {
                    expect(status).to.equal(200);
                  });
                }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: "Lista sensores vinculados a uma plantação"
