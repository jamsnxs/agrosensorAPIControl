info:
  name: Deletar Vínculo
  type: http
  seq: 6

http:
  method: DELETE
  url: http://localhost:3000/api/plantacoes-sensores/{{id}}
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        // Captura o status e o corpo da resposta
        const status = res.getStatus();
                const resposta = res.getBody();

                // Remoção bem sucedida (200)
                if (status === 200) {
                  test("Deve remover o vínculo plantação-sensor com sucesso", function() {
                    expect(resposta.mensagem).to.be.a('string');
                  });
                // Vínculo já removido (400)
                } else if (status === 400) {
                  test("Nas execuções seguintes, deve retornar 400 (vínculo já removido)", function() {
                    expect(status).to.equal(400);
                    expect(resposta.erro).to.be.a('string');
                  });
                } else {
                  test("Resposta inesperada do servidor", function() {
                    expect(status).to.be.oneOf([200, 400]);
                  });
                }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: "Remove vínculo plantação-sensor pelo ID"
