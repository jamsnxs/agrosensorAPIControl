info:
  name: Deletar Vínculos da Plantação
  type: http
  seq: 7

http:
  method: DELETE
  url: http://localhost:3000/api/plantacoes-sensores/plantacao/{{plantacao_id}}
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        // Captura o status e o corpo da resposta
        const status = res.getStatus();
                const resposta = res.getBody();

                // Remoção em lote bem sucedida (200)
                if (status === 200) {
                  test("Deve remover todos os vínculos da plantação", function() {
                    expect(resposta.mensagem).to.be.a('string');
                    expect(resposta.mensagem).to.match(/sensor(es)? desvinculado(s)?/);
                  });
                // Plantação sem vínculos (400)
                } else if (status === 400) {
                  test("Deve retornar 400 se a plantação não tiver sensores vinculados", function() {
                    expect(status).to.equal(400);
                    expect(resposta.erro).to.be.a('string');
                  });
                } else {
                  test("Resposta inesperada do servidor", function() {
                    expect(status).to.be.oneOf([200, 400]);
                  });
                }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: "Remove todos os vínculos de sensores de uma plantação"
