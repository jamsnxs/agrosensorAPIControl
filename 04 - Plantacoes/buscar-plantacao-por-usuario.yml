info:
  name: Buscar Plantação por Usuário
  type: http
  seq: 6

http:
  method: GET
  url: http://localhost:3000/api/plantacoes/usuario/{{id}}
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        // Captura o status e o corpo da resposta
        const status = res.getStatus();
        const plantacoes = res.getBody();

        // Usuário encontrado (200), verifica se a lista tem a estrutura esperada
        if (status === 200) {
          test("Deve listar plantações vinculadas ao usuário", function() {
            expect(plantacoes).to.be.an('array');
            if (plantacoes.length > 0) {
              expect(plantacoes[0]).to.have.property('usuario_id');
            }
          });
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: "Lista plantações de um usuário específico"
