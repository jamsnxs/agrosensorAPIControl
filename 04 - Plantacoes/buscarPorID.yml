info:
  name: buscarPorID
  type: http
  seq: 2

http:
  method: GET
  url: http://localhost:3000/api/plantacoes/1
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        const status = res.getStatus();
        const plantacao = res.getBody();

        if (status === 200) {
          test("Deve encontrar os detalhes da plantação solicitada", function() {
            expect(plantacao.id).to.equal(1);
            expect(plantacao).to.have.property('nome');
          });
        } else if (status === 404) {
          test("Deve tratar plantação inexistente com status 404", function() {
            expect(status).to.equal(404);
          });
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
