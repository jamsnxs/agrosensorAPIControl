info:
  name: buscarPorUsuario
  type: http
  seq: 6

http:
  method: GET
  url: http://localhost:3000/api/plantacoes/usuario/4
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        const status = res.getStatus();
        const plantacoes = res.getBody();

        if (status === 200) {
          test("Deve listar plantações vinculadas ao usuário", function() {
            expect(plantacoes).to.be.an('array');
            if (plantacoes.length > 0) {
              expect(plantacoes[0]).to.have.property('usuario_id');
            }
          });
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
