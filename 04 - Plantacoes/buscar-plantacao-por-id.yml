info:
  name: Buscar Plantação por ID
  type: http
  seq: 2

http:
  method: GET
  url: http://localhost:3000/api/plantacoes/{{id}}
  auth: inherit

runtime:
  variables:
    - name: id
      value: d05f1635-3743-48a8-8bb0-1c0b50c3cb7f
  scripts:
    - type: tests
      code: |-
        // Captura o status e o corpo da resposta
        const status = res.getStatus();
        const plantacao = res.getBody();

        // Plantação encontrada (200), verifica os campos esperados
        if (status === 200) {
          test("Deve encontrar os detalhes da plantação solicitada", function() {
            expect(plantacao).to.have.property('nome');
          });
        // ID inexistente (400)
        } else if (status === 400) {
          test("Deve tratar plantação inexistente com status 400", function() {
            expect(status).to.equal(400);
          });
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Busca plantação pelo ID
