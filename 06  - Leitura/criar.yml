info:
  name: criar
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:3000/api/leituras
  body:
    type: json
    data: |-
      {
        "plantacao_id": 1,
        "umidade_solo": 15.0,
        "umidade_ar": 35.5,
        "temperatura": 38.2,
        "luminosidade": 85
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        const status = res.getStatus();
        const corpo = res.getBody();

        if (status === 201 || status === 200) {
          test("Deve receber, processar e persistir o pacote de telemetria no SQLite", function() {
            expect(status).to.be.oneOf([200, 201]);
          });
          
          test("Deve processar a leitura e retornar os dados persistidos", function() {
            expect(corpo.dados).to.be.an('array');
            expect(corpo.dados.length).to.be.at.least(1);
            expect(corpo.dados[0]).to.have.property('id');
            expect(corpo.dados[0]).to.have.property('plantacao_id');
          });
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
