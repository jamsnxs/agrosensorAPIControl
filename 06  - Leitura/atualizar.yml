info:
  name: atualizar
  type: http
  seq: 5

http:
  method: PUT
  url: http://localhost:3000/api/leituras/1
  body:
    type: json
    data: |-
      {
        "temperatura": 30.5,
        "umidade_ar": 60.0
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        const status = res.getStatus();

        if (status === 200) {
          test("Deve atualizar os campos da leitura com sucesso", function() {
            expect(status).to.equal(200);
            const dados = res.getBody().dados || res.getBody();
            expect(dados.temperatura).to.equal(30.5);
            expect(dados.umidade_ar).to.equal(60.0);
          });
        } else if (status === 400) {
          test("Deve retornar 400 se a leitura não existir", function() {
            expect(status).to.equal(400);
          });
        } else {
          test("Resposta inesperada do servidor", function() {
            expect(status).to.be.oneOf([200, 400]);
          });
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
