info:
  name: Buscar Leitura por ID
  type: http
  seq: 3

http:
  method: GET
  url: http://localhost:3000/api/leituras/{{id}}
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        // Captura o status e o corpo da resposta
        const status = res.getStatus();
        const leitura = res.getBody();

        // Leitura encontrada (200), verifica todos os campos da telemetria
        if (status === 200) {
          test("Deve retornar a leitura com dados completos", function() {
            expect(leitura).to.be.an('object');
            expect(leitura).to.have.property('id');
            expect(leitura).to.have.property('plantacao_id');
            expect(leitura).to.have.property('data_hora');
            expect(leitura).to.have.property('temperatura');
            expect(leitura).to.have.property('umidade_ar');
            expect(leitura).to.have.property('umidade_solo');
            expect(leitura).to.have.property('luminosidade');
          });
        // ID inexistente (400)
        } else if (status === 400) {
          test("Deve retornar 400 para leitura inexistente", function() {
            expect(status).to.equal(400);
            expect(leitura.erro).to.be.a('string');
          });
        } else {
          test("Resposta inesperada do servidor", function() {
            expect(status).to.be.oneOf([200, 400]);
          });
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: "Busca leitura pelo ID"
