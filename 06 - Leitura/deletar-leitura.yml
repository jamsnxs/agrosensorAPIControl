info:
  name: Deletar Leitura
  type: http
  seq: 6

http:
  method: DELETE
  url: http://localhost:3000/api/leituras/{{id}}
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        // Captura o status e o corpo da resposta
        const status = res.getStatus();
        const resposta = res.getBody();

        // Remoção bem sucedida (200)
        if (status === 200) {
          test("Deve remover a leitura com sucesso", function() {
            expect(resposta.mensagem).to.be.a('string');
          });
        // Leitura já removida (400)
        } else if (status === 400) {
          test("Nas execuções seguintes, deve retornar 400 (leitura já removida)", function() {
            expect(status).to.equal(400);
            expect(resposta.erro).to.be.a('string');
          });
        } else {
          test("Resposta inesperada do servidor", function() {
            expect(status).to.be.oneOf([200, 400]);
          });
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: "Remove leitura pelo ID"
