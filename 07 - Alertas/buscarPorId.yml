info:
  name: buscarPorId
  type: http
  seq: 3

http:
  method: GET
  url: http://localhost:3000/api/alertas/1
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        const status = res.getStatus();
        const alerta = res.getBody();

        if (status === 200) {
          test("Deve retornar detalhes do alerta pelo ID", function() {
            expect(alerta.id).to.equal(1);
            expect(alerta).to.have.property('tipo');
            expect(alerta).to.have.property('mensagem');
          });
        } else if (status === 400) {
          test("Deve retornar 400 se o alerta não existir", function() {
            expect(status).to.equal(400);
          });
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
