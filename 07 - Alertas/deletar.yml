info:
  name: deletar
  type: http
  seq: 6

http:
  method: DELETE
  url: http://localhost:3000/api/alertas/{{id}}
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        // Captura o status HTTP da resposta
        const status = res.getStatus();

        // Remoção bem sucedida: 200 (com corpo) ou 204 (sem corpo)
        if (status === 200 || status === 204) {
          test("Deve remover o alerta com sucesso", function() {
            expect(status).to.be.oneOf([200, 204]);
          });
        // ID inexistente (400)
        } else if (status === 400) {
          test("Deve retornar 400 se o alerta não existir", function() {
            expect(status).to.equal(400);
          });
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
