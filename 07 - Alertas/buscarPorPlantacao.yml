info:
  name: buscarPorPlantacao
  type: http
  seq: 4

http:
  method: GET
  url: http://localhost:3000/api/alertas/plantacao/1
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        const status = res.getStatus();
        const alertas = res.getBody();

        if (status === 200) {
          test("Deve listar alertas de uma plantação específica", function() {
            expect(alertas).to.be.an('array');
            if (alertas.length > 0) {
              expect(alertas[0]).to.have.property('plantacao_id');
            }
          });
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
