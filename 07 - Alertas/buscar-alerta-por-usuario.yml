info:
  name: Buscar Alerta por Usuário
  type: http
  seq: 5

http:
  method: GET
  url: http://localhost:3000/api/alertas/usuario/{{usuario_id}}
  auth: inherit

runtime:
  variables:
    - name: usuario_id
      value: b2c3d4e5-f6a7-4b8c-9d0e-1f2a3b4c5d6e
  scripts:
    - type: tests
      code: |-
        // Captura o status e o corpo da resposta
        const status = res.getStatus();
        const alertas = res.getBody();

        // Usuário encontrado (200), verifica se a lista de alertas foi retornada
        if (status === 200) {
          test("Deve listar alertas de todas as plantações do usuário", function() {
            expect(alertas).to.be.an('array');
          });
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Lista alertas de todas as plantações de um usuário
